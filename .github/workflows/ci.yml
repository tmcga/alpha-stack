name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
      - run: uv tool install ruff
      - run: ruff check tools/ mcp_server.py tests/
      - run: ruff format --check tools/ mcp_server.py tests/

  test-tools:
    name: Test Tools
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - run: pip install pytest
      - name: Run tool tests
        run: python -m pytest tests/ -v

  test-mcp:
    name: Test MCP Server
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
      - run: uv sync
      - name: Verify MCP server imports
        run: uv run python -c "import mcp_server; print('MCP server loaded')"

  line-count:
    name: Line Count Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Verify all tools under 200 lines
        run: |
          fail=0
          for f in tools/*.py; do
            lines=$(wc -l < "$f")
            if [ "$lines" -gt 200 ]; then
              echo "FAIL: $f has $lines lines (max 200)"
              fail=1
            fi
          done
          if [ "$fail" -eq 1 ]; then exit 1; fi
          echo "All tools under 200 lines"

  structure:
    name: Structure Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Verify all skills have SKILL.md and prompts
        run: |
          fail=0
          for d in skills/*/; do
            if [ ! -f "$d/SKILL.md" ]; then
              echo "FAIL: $d missing SKILL.md"
              fail=1
            fi
            if [ ! -d "$d/prompts" ]; then
              echo "FAIL: $d missing prompts/"
              fail=1
            fi
            count=$(find "$d/prompts" -name "*.md" | wc -l)
            if [ "$count" -eq 0 ]; then
              echo "FAIL: $d/prompts/ has no .md files"
              fail=1
            fi
          done
          if [ "$fail" -eq 1 ]; then exit 1; fi
          echo "All 12 skills valid"
