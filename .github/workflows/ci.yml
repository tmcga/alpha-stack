name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
      - run: uv tool install ruff
      - run: ruff check tools/ mcp_server.py tests/
      - run: ruff format --check tools/ mcp_server.py tests/

  test-tools:
    name: Test Tools
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - run: pip install pytest
      - name: Run tool tests
        run: python -m pytest tests/ -v

  test-mcp:
    name: Test MCP Server
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
      - run: uv sync
      - name: Verify MCP server imports
        run: uv run python -c "import mcp_server; print('MCP server loaded')"

  line-count:
    name: Line Count Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Verify all tools under 200 lines
        run: |
          fail=0
          for f in tools/*.py; do
            lines=$(wc -l < "$f")
            if [ "$lines" -gt 200 ]; then
              echo "FAIL: $f has $lines lines (max 200)"
              fail=1
            fi
          done
          if [ "$fail" -eq 1 ]; then exit 1; fi
          echo "All tools under 200 lines"

  structure:
    name: Structure Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Verify all skills have SKILL.md
        run: |
          fail=0
          count=0
          for d in skills/*/; do
            if [ ! -f "$d/SKILL.md" ]; then
              echo "FAIL: $d missing SKILL.md"
              fail=1
            else
              count=$((count+1))
            fi
          done
          if [ "$fail" -eq 1 ]; then exit 1; fi
          echo "All $count skills valid"
      - name: Verify skill cross-references match registry
        run: |
          # Extract registered commands from CLAUDE.md (| `/command` | pattern)
          registered=$(grep -oP '(?<=\| `/)[\w-]+(?=` \|)' CLAUDE.md | sort -u)
          # Also allow self-references to skill directory names
          dirs=$(ls -1 skills/)
          valid=$(printf '%s\n%s' "$registered" "$dirs" | sort -u)

          fail=0
          # Find all /command references in SKILL.md files (backtick-wrapped)
          grep -rnoP '`/[\w-]+`' skills/*/SKILL.md | while IFS=: read -r file line match; do
            cmd=$(echo "$match" | tr -d '`/' )
            if ! echo "$valid" | grep -qx "$cmd"; then
              echo "FAIL: $file:$line references unknown command $match"
              echo "fail" > /tmp/xref_fail
            fi
          done
          if [ -f /tmp/xref_fail ]; then exit 1; fi
          echo "All skill cross-references valid"

  security:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - run: pip install bandit
      - name: Run bandit security scan
        run: bandit -r tools/ mcp_server.py -ll -q
